<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>
</head>
<body>

    <h2>📦 Inventory Management System</h2>

    <a href="/add">➕ Add New Product</a>

    <br><br>

<form method="GET" action="/">
    <input type="text" name="search" placeholder="Search product">
    <button type="submit">Search</button>
</form>
<br>

    <table border="1" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>

        {% for p in products %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>₹{{ p[3] }}</td>
            <td>
                <a href="/edit/{{ p[0] }}">✏️ Edit</a> |
                <a href="/delete/{{ p[0] }}">❌ Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
